<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 60: Too Early and Too Late - 智能跟读课本</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-zh: #cbd5e1;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --highlight-bg: rgba(56, 189, 248, 0.15);
            --highlight-border: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.08) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        header {
            width: 100%;
            max-width: 900px;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        /* 句子列表 */
        .text-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sentence-block {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1.2rem;
            
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        

        /* 句子结构语法分析样式 */
        .syntax-toggle {
            align-self: flex-start;
            font-size: 0.8rem;
            color: var(--accent-color);
            background: rgba(56, 189, 248, 0.08);
            border: 1px dashed rgba(56, 189, 248, 0.3);
            border-radius: 6px;
            padding: 4px 10px;
            
            margin-top: 4px;
            user-select: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .syntax-toggle:hover {
            background: rgba(56, 189, 248, 0.15);
            border-style: solid;
        }

        .syntax-content {
            display: none;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-zh);
            background: rgba(15, 23, 42, 0.3);
            border-left: 3px solid var(--accent-color);
            padding: 10px 12px;
            border-radius: 4px;
            margin-top: 6px;
            width: 100%;
            animation: fadeIn 0.3s ease;
        }

        .syntax-content p {
            margin-bottom: 6px;
        }

        .syntax-content ul {
            padding-left: 18px;
        }

        .syntax-content li {
            margin-bottom: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .en {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 0.5rem;
            font-weight: 400;
            letter-spacing: 0.01em;
            color: var(--text-primary);
        }

        .sentence-block.active .en {
            color: #fff;
        }

        /* 单个单词交互样式 */
        .word {
            display: inline-block;
            
            transition: all 0.15s ease;
            border-radius: 4px;
            padding: 0 2px;
            margin: 0 -1px;
        }

        .word:hover {
            color: var(--accent-color);
            background: rgba(56, 189, 248, 0.15);
            text-decoration: underline;
        }

        /* 悬浮单词释义卡片 */
        .dict-tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 10px 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            color: var(--text-primary);
            z-index: 2000;
            pointer-events: none;
            display: none;
            opacity: 0;
            transform: translateY(5px);
            transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1), transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 180px;
            max-width: 260px;
            line-height: 1.4;
        }
        
        .dict-tooltip.visible {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .dict-word-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 4px;
        }

        .dict-tooltip-word {
            font-weight: 700;
            color: var(--accent-color);
            font-size: 1.05rem;
        }

        .dict-tooltip-ipa {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
        }

        .dict-tooltip-pos {
            font-size: 0.75rem;
            color: #818cf8;
            font-style: italic;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .dict-tooltip-trans {
            color: var(--text-zh);
            font-size: 0.9rem;
            font-weight: 400;
        }

        .word.word-highlight {
            color: #0f172a !important;
            background: var(--accent-color) !important;
            font-weight: 600;
            box-shadow: 0 0 8px var(--accent-color);
        }

        .zh {
            font-size: 0.95rem;
            color: var(--text-zh);
            line-height: 1.5;
        }

        .badge {
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent-color);
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            margin-bottom: 0.5rem;
            display: inline-block;
            font-weight: 600;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            
            transition: color 0.2s ease;
        }

        .checkbox-container:hover {
            color: var(--text-primary);
        }

        .checkbox-container input {
            accent-color: var(--accent-color);
            
            width: 15px;
            height: 15px;
        }

        @media (max-width: 768px) {
            .progress-panel { flex-direction: column; align-items: stretch; gap: 0.8rem; border-radius: 0; }
            .modes-row { gap: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <span class="badge">New Concept English 3</span>
        <h1>Lesson 60: Too Early and Too Late</h1>
        <p class="subtitle">第 60 课：太值了</p>
    </header>

    

    

    <main class="text-container" id="text-container">
        <!-- 句子将被 JS 渲染在此处 -->
    </main>

    <script>
        const articles = [
            {
                en: "Lesson 60: Too Early and Too Late",
                zh: "第 60 课：太早和太晚"
            },
            {
                en: "Punctuality is a necessary habit in all public affairs in civilized society.",
                zh: "准时是文明社会中一切公共事务的必要习惯。",
                syntax: {
                    main: "Punctuality (主语) + is (系动词) + habit (表语)",
                    components: [
                        { part: "in all public affairs", role: "介词短语作后置定语修饰 habit。" },
                        { part: "in civilized society", role: "介词短语作后置定语修饰 affairs。" }
                    ]
                }
            },
            {
                en: "Without it, nothing could ever be brought to a conclusion; everything would be in a state of chaos.",
                zh: "没有它，任何事情都无法得出结论；一切都将陷入混乱状态。",
                syntax: {
                    main: "分号连接的两个并列分句",
                    components: [
                        { part: "Without it", role: "介词短语作条件状语，表示“如果没有它”。" },
                        { part: "分句1：nothing could ever be brought...", role: "nothing (主语) + could be brought (谓语，被动语态) + to a conclusion (状语)。" },
                        { part: "分句2：everything would be in...", role: "everything (主语) + would be (系动词) + in a state of... (表语，介词短语)。" }
                    ]
                }
            },
            {
                en: "Only in a sparsely-populated rural community is it possible to disregard it.",
                zh: "只有在人口稀少的农村社区，才有可能不予理会。",
                syntax: {
                    main: "It (形式主语) + is (系动词) + possible (表语) + to disregard it (真正主语)",
                    components: [
                        { part: "Only in a sparsely-populated rural community", role: "Only 引导的介词短语置于句首，引起主句部分倒装（is it...）。" },
                        { part: "to disregard it", role: "动词不定式短语，在句中作真正的主语。" }
                    ]
                }
            },
            {
                en: "In ordinary living, there can be some tolerance of unpunctuality.",
                zh: "在日常生活中，对不准时可以有一些宽容。",
                syntax: {
                    main: "There (引导词) + can be (谓语) + tolerance (主语)",
                    components: [
                        { part: "In ordinary living", role: "介词短语作范围状语。" },
                        { part: "of unpunctuality", role: "介词短语作定语修饰 tolerance。" }
                    ]
                }
            },
            {
                en: "The intellectual, who is working on some abstruse problem, has everything coordinated and organized for the matter in hand.",
                zh: "正在研究某些深奥问题的知识分子，已经为手头的事情协调和组织好了一切。",
                syntax: {
                    main: "The intellectual (主语) + has (谓语) + everything (宾语) + coordinated and organized (宾语补足语)",
                    components: [
                        { part: "who is working on some abstruse problem", role: "who 引导非限制性定语从句，补充说明主语 intellectual。" },
                        { part: "coordinated and organized", role: "过去分词短语作 everything 的宾补，表示被动关系。" },
                        { part: "for the matter in hand", role: "介词短语作目的/范围状语。" }
                    ]
                }
            },
            {
                en: "He is therefore forgiven if late for a dinner party.",
                zh: "因此，如果他去参加晚宴迟到了，是可以被原谅的。",
                syntax: {
                    main: "He (主语) + is forgiven (谓语，被动语态)",
                    components: [
                        { part: "therefore", role: "副词作状语，表示“因此”。" },
                        { part: "if late for...", role: "条件状语从句的省略结构，完整形式为 if he is late for..." }
                    ]
                }
            },
            {
                en: "But people are often reproached for unpunctuality when their only fault is cutting things fine.",
                zh: "但是，人们经常因为不准时而受到指责，而他们唯一的缺点就是把时间掐得太死。",
                syntax: {
                    main: "people (主语) + are reproached (谓语，被动语态) + for unpunctuality (原因状语)",
                    components: [
                        { part: "when their only fault is...", role: "when 引导时间状语从句。" },
                        { part: "cutting things fine", role: "动名词短语在从句中作表语。" }
                    ]
                }
            },
            {
                en: "It is hard for energetic, quick-minded people to waste time, so they are often tempted to finish a job before setting out to keep an appointment.",
                zh: "精力充沛、脑子快的人很难浪费时间，所以他们常常被诱惑在出发赴约之前完成一项工作。",
                syntax: {
                    main: "由 so 连接的并列因果句",
                    components: [
                        { part: "分句1：It is hard for... to waste time", role: "it 为形式主语，to waste time 是真正主语。for... people 为不定式的逻辑主语。" },
                        { part: "分句2：they are often tempted to finish...", role: "they (主) + are tempted (谓) + to finish... (宾补/目的状语)。" },
                        { part: "before setting out to keep...", role: "before 引导的介词短语作时间状语。setting out 为动名词。" }
                    ]
                }
            },
            {
                en: "If no accidents occur on the way, like punctured tyres, diversions of traffic, sudden descent of fog, they will be on time.",
                zh: "如果路上没有发生意外，比如轮胎被扎、交通绕行、突降大雾，他们就会按时到达。",
                syntax: {
                    main: "they (主语) + will be (系动词) + on time (表语)",
                    components: [
                        { part: "If no accidents occur on the way", role: "If 引导条件状语从句。" },
                        { part: "like punctured tyres...", role: "like 引导的介词短语作后置定语，举例修饰 accidents。" }
                    ]
                }
            },
            {
                en: "They are often more industrious, useful citizens than those who are never late.",
                zh: "与那些从不迟到的人相比，他们往往是更勤奋、更有用的公民。",
                syntax: {
                    main: "They (主语) + are (系动词) + citizens (表语)",
                    components: [
                        { part: "more industrious, useful... than those", role: "形容词比较级作定语，than 引导比较状语。" },
                        { part: "who are never late", role: "who 引导定语从句，修饰代词 those。" }
                    ]
                }
            },
            {
                en: "The over-punctual can be as much a trial to others as the unpunctual.",
                zh: "过于准时的人对他人来说，也可以和不准时的人一样是一种折磨。",
                syntax: {
                    main: "The over-punctual (主语，形容词名词化) + can be (系动词) + a trial (表语)",
                    components: [
                        { part: "as much... as the unpunctual", role: "as... as 同级比较结构，表示同等程度的对比。" },
                        { part: "to others", role: "对象状语。" }
                    ]
                }
            },
            {
                en: "The guest who arrives half an hour too soon is the greatest nuisance.",
                zh: "提前半小时到达的客人是最令人讨厌的。",
                syntax: {
                    main: "The guest (主语) + is (系动词) + nuisance (表语)",
                    components: [
                        { part: "who arrives half an hour too soon", role: "who 引导限制性定语从句，修饰主语 guest。" }
                    ]
                }
            },
            {
                en: "Some friends of my family had this irritating habit.",
                zh: "我家的几位朋友就有这种令人恼火的习惯。",
                syntax: {
                    main: "Some friends (主语) + had (谓语) + habit (宾语)",
                    components: [
                        { part: "of my family", role: "介词短语作定语修饰 friends。" },
                        { part: "irritating", role: "现在分词作形容词定语，修饰 habit。" }
                    ]
                }
            },
            {
                en: "The only thing to do was ask them to come half an hour later than the other guests.",
                zh: "唯一的办法就是请他们比其他客人晚到半小时。",
                syntax: {
                    main: "The only thing (主语) + was (系动词) + ask them... (表语，省略 to 的不定式短语)",
                    components: [
                        { part: "to do", role: "不定式作定语，修饰 thing。" },
                        { part: "ask them to come...", role: "them 作 ask 的宾语，to come... 作宾补。" },
                        { part: "than the other guests", role: "than 引导的比较状语。" }
                    ]
                }
            },
            {
                en: "Then they arrived just when we wanted them.",
                zh: "这样他们就在我们希望他们到达的时候到达了。",
                syntax: {
                    main: "they (主语) + arrived (谓语)",
                    components: [
                        { part: "just when we wanted them", role: "when 引导的时间状语从句，just 起强调作用。" }
                    ]
                }
            },
            {
                en: "If you are catching a train, it is always better to be comfortably early than even a fraction of a minute too late.",
                zh: "如果你要赶火车，宽宽绰绰地早到总是比哪怕迟到一分一秒都要好。",
                syntax: {
                    main: "it (形式主语) + is (系) + better (表) + to be early (真正主语)",
                    components: [
                        { part: "If you are catching a train", role: "If 引导条件状语从句。" },
                        { part: "than even a fraction...", role: "比较状语短语。" }
                    ]
                }
            },
            {
                en: "Although being early may mean wasting a little time, this will be less than if you miss the train and have to wait an hour or more for the next one; and you avoid the frustration of arriving at the very moment when the train is drawing out of the station and being unable to get on it.",
                zh: "虽然早到可能意味着浪费一点时间，但这总比你误了火车而不得不等上一个小时或更长时间坐下一班车要浪费得少；而且你还可以避免在火车正开出车站、自己却无法上车的那一刻到达时的沮丧。",
                syntax: {
                    main: "and 连接两个并列分句",
                    components: [
                        { part: "分句1中 Although being early...", role: "Although 引导让步状语从句。being early 为动名词作从句主语。" },
                        { part: "分句1中 this will be less than if...", role: "this (主) + will be (系) + less (表)。than if... 引导比较状语从句。" },
                        { part: "分句2中 you avoid the frustration of...", role: "you (主) + avoid (谓) + frustration (宾)。of arriving... 介词短语作定语修饰 frustration。" },
                        { part: "分句2中 when the train is drawing...", role: "when 引导定语从句，修饰 moment。" }
                    ]
                }
            },
            {
                en: "An even harder situation is to be on the platform in good time for a train and still to see it go off without you.",
                zh: "更糟糕的情况是，你及时赶到了站台，却仍然眼睁睁地看着火车没有载你就开走了。",
                syntax: {
                    main: "situation (主语) + is (系动词) + to be... and to see... (并列表语)",
                    components: [
                        { part: "in good time for a train", role: "介词短语作状语。" },
                        { part: "to see it go off...", role: "不定式短语。see 后面接 it (宾) + go off (不带 to 的不定式作宾补)。" }
                    ]
                }
            },
            {
                en: "Such an experience befell a certain young girl the first time she was travelling alone.",
                zh: "这样一个经历发生在一个初次独自旅行的年轻姑娘身上。",
                syntax: {
                    main: "experience (主语) + befell (谓语) + girl (宾语)",
                    components: [
                        { part: "the first time she was travelling alone", role: "名词短语作连词，引导时间状语从句。" }
                    ]
                }
            },
            {
                en: "She entered the station twenty minutes before the train was due, since her parents had impressed upon her that it would be unforgivable to miss it and cause the friends with whom she was going to stay to make two journeys to meet her.",
                zh: "她在火车到站前20分钟进入了车站，因为她的父母曾反复向她强调，如果误了车，导致她要去借宿的朋友们跑两趟来接她，那是不可原谅的。",
                syntax: {
                    main: "She (主语) + entered (谓语) + station (宾语)",
                    components: [
                        { part: "twenty minutes before...", role: "介词短语作时间状语。" },
                        { part: "since her parents had...", role: "since 引导原因状语从句。" },
                        { part: "that it would be...", role: "that 引导的宾语从句作 impressed 的宾语。从句中 it 是形式主语，真正主语是 to miss it and cause...。" },
                        { part: "with whom she was going to stay", role: "介词+关系代词 whom 引导的定语从句，修饰 friends。" }
                    ]
                }
            },
            {
                en: "She gave her luggage to a porter and showed him her ticket.",
                zh: "她把行李交给了搬运工，并给他看了车票。",
                syntax: {
                    main: "She (主语) + 并列谓语 (gave, showed)",
                    components: [
                        { part: "gave her luggage to a porter", role: "luggage (宾)，to a porter 作方向状语。" },
                        { part: "showed him her ticket", role: "him (间宾) + ticket (直宾) 构成的双宾语结构。" }
                    ]
                }
            },
            {
                en: "To her horror he said that she was two hours too soon.",
                zh: "令她惊恐的是，他说她早到了两个小时。",
                syntax: {
                    main: "he (主语) + said (谓语) + that 宾语从句",
                    components: [
                        { part: "To her horror", role: "介词短语作状语，修饰整句话，表示主观情感。" },
                        { part: "that she was two hours too soon", role: "that 引导的宾语从句，作 said 的宾语。" }
                    ]
                }
            },
            {
                en: "She felt in her handbag for the piece of paper on which her father had written down all the details of the journey and gave it to the porter.",
                zh: "她在手提包里摸索着父亲写有旅途所有细节的那张纸，并把它交给了搬运工。",
                syntax: {
                    main: "She (主语) + 并列谓语 (felt, gave)",
                    components: [
                        { part: "felt in her handbag for...", role: "felt for 寻找，in her handbag 作地点状语。" },
                        { part: "on which her father had written...", role: "on which 引导定语从句，修饰 paper。" },

        const textContainer = document.getElementById('text-container');

        const synth = window.speechSynthesis;
        let voices = [];

        function speakWord(wordText) {
            synth.cancel();
            const cleanWord = wordText.replace(/[^a-zA-Z0-9'-]/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanWord);
            if (voices.length === 0) {
                voices = synth.getVoices();
            }
            const samantha = voices.find(v => v.name.includes('Samantha'));
            if (samantha) {
                utterance.voice = samantha;
            } else {
                const enVoice = voices.find(v => v.lang.toLowerCase().startsWith('en'));
                if (enVoice) utterance.voice = enVoice;
            }
            utterance.rate = 0.6;
            synth.speak(utterance);
        }

        // 将英文句子格式化为带有字符偏移定位的单词<span>标签
        function renderSentenceHTML(text) {
            const regex = /([a-zA-Z0-9]+(?:[-'][a-zA-Z0-9]+)*)|([^\s\w]+)|(\s+)/g;
            let match;
            let html = '';
            
            regex.lastIndex = 0;
            while ((match = regex.exec(text)) !== null) {
                const token = match[0];
                const word = match[1];
                const start = match.index;
                const end = regex.lastIndex;
                
                if (word) {
                    html += `<span class="word" data-start="${start}" data-end="${end}">${token}</span>`;
                } else {
                    html += `<span>${token}</span>`;
                }
            }
            return html;
        }

        // 渲染文本块
        function renderText() {
            textContainer.innerHTML = '';
            articles.forEach((item, index) => {
                const block = document.createElement('div');
                block.className = 'sentence-block';
                block.dataset.index = index;
                
                let syntaxHTML = '';
                if (item.syntax) {
                    syntaxHTML = `
                        <div class="syntax-toggle">📌 语法分析 / Grammar Breakdown</div>
                        <div class="syntax-content">
                            <p><strong>句子主干：</strong>${item.syntax.main}</p>
                            <ul>
                                ${item.syntax.components ? item.syntax.components.map(c => `<li><strong>${c.part}</strong>: ${c.role}</li>`).join('') : ''}
                            </ul>
                        </div>
                    `;
                }

                block.innerHTML = `
                    <p class="en">${renderSentenceHTML(item.en)}</p>
                    <p class="zh">${item.zh}</p>
                    ${syntaxHTML}
                `;

                block.querySelectorAll('.word').forEach(wordSpan => {
                    wordSpan.addEventListener('click', (e) => {
                        e.stopPropagation();
                        speakWord(e.target.textContent);
                    });
                });

                const toggleBtn = block.querySelector('.syntax-toggle');
                if (toggleBtn) {
                    toggleBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const content = toggleBtn.nextElementSibling;
                        if (content.style.display === 'block') {
                            content.style.display = 'none';
                            toggleBtn.innerHTML = '📌 语法分析 / Grammar Breakdown';
                        } else {
                            content.style.display = 'block';
                            toggleBtn.innerHTML = '⚡️ 收起分析 / Close Breakdown';
                        }
                    });
                }
                
                textContainer.appendChild(block);
            });
        }

        renderText();

        // 释义浮窗逻辑
        const tooltip = document.createElement('div');
        tooltip.className = 'dict-tooltip';
        tooltip.innerHTML = `
            <div class="dict-word-row">
                <span class="dict-tooltip-word"></span>
                <span class="dict-tooltip-ipa"></span>
            </div>
            <div class="dict-tooltip-pos"></div>
            <div class="dict-tooltip-trans"></div>
        `;
        document.body.appendChild(tooltip);

        let hoverTimeout = null;
        let dictCache = {};

        textContainer.addEventListener('mouseover', (e) => {
            const wordSpan = e.target.closest('.word');
            if (!wordSpan) return;

            const word = wordSpan.textContent.replace(/[^a-zA-Z0-9'-]/g, '').toLowerCase();
            if (!word) return;

            clearTimeout(hoverTimeout);
            hoverTimeout = setTimeout(() => {
                showTooltip(wordSpan, word);
            }, 300); // 300ms 悬浮延迟，防止划过时频繁触发
        });

        textContainer.addEventListener('mouseout', (e) => {
            const wordSpan = e.target.closest('.word');
            if (!wordSpan) return;
            clearTimeout(hoverTimeout);
            hideTooltip();
        });

        function showTooltip(target, word) {
            const rect = target.getBoundingClientRect();
            const tooltipWord = tooltip.querySelector('.dict-tooltip-word');
            const tooltipIpa = tooltip.querySelector('.dict-tooltip-ipa');
            const tooltipPos = tooltip.querySelector('.dict-tooltip-pos');
            const tooltipTrans = tooltip.querySelector('.dict-tooltip-trans');

            tooltipWord.textContent = word;
            tooltipIpa.textContent = "";
            tooltipPos.textContent = "";
            tooltipTrans.textContent = "正在查询...";
            
            tooltip.classList.add('visible');
            adjustTooltipPosition(target);

            if (dictCache[word]) {
                const cached = dictCache[word];
                tooltipIpa.textContent = cached.ipa;
                tooltipPos.textContent = cached.pos;
                tooltipTrans.textContent = cached.trans;
                adjustTooltipPosition(target);
            } else {
                Promise.all([
                    fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=${encodeURIComponent(word)}`).then(res => res.json()),
                    fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`).then(res => res.json()).catch(() => null)
                ])
                .then(([transData, dictData]) => {
                    const trans = transData[0][0][0];
                    let ipa = "";
                    let pos = "";
                    
                    if (dictData && dictData[0]) {
                        ipa = dictData[0].phonetic || (dictData[0].phonetics && dictData[0].phonetics.find(p => p.text)?.text) || "";
                        if (dictData[0].meanings) {
                            const parts = dictData[0].meanings.map(m => m.partOfSpeech);
                            pos = [...new Set(parts)].join(', ');
                        }
                    }
                    
                    const result = { ipa, pos, trans };
                    dictCache[word] = result;
                    
                    if (tooltipWord.textContent === word) {
                        tooltipIpa.textContent = ipa;
                        tooltipPos.textContent = pos;
                        tooltipTrans.textContent = trans;
                        adjustTooltipPosition(target);
                    }
                })
                .catch(() => {
                    if (tooltipWord.textContent === word) {
                        tooltipTrans.textContent = "查询失败";
                    }
                });
            }
        }

        function adjustTooltipPosition(target) {
            const rect = target.getBoundingClientRect();
            const tooltipRect = tooltip.getBoundingClientRect();
            const left = rect.left + (rect.width - tooltipRect.width) / 2 + window.scrollX;
            const top = rect.top - tooltipRect.height - 8 + window.scrollY;
            tooltip.style.left = `${Math.max(10, left)}px`;
            tooltip.style.top = `${top}px`;
        }

        function hideTooltip() {
            tooltip.classList.remove('visible');
        }

        renderText();
        
        
    </script>
