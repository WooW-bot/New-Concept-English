<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 58: A Spot of Bother - 智能跟读课本</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-zh: #cbd5e1;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --highlight-bg: rgba(56, 189, 248, 0.15);
            --highlight-border: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.08) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem 6.5rem 1rem;
        }

        header {
            width: 100%;
            max-width: 900px;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        /* 课文主体 */
        .text-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .sentence-block {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 1.2rem 1.5rem;
            
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        

        .en {
            font-size: 1.25rem;
            line-height: 1.7;
            font-weight: 400;
            color: var(--text-primary);
        }

        .zh {
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-zh);
            font-weight: 300;
        }

        .word {
            display: inline-block;
            
            border-radius: 4px;
            padding: 0 2px;
            transition: all 0.15s ease;
        }

        .word:hover {
            background-color: var(--highlight-bg);
            color: var(--accent-color);
            transform: translateY(-1px);
        }

        /* 悬浮单词释义卡片 */
        .dict-tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 10px 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            color: var(--text-primary);
            z-index: 2000;
            pointer-events: none;
            display: none;
            opacity: 0;
            transform: translateY(5px);
            transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1), transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 180px;
            max-width: 260px;
            line-height: 1.4;
        }
        
        .dict-tooltip.visible {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .dict-word-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 4px;
        }

        .dict-tooltip-word {
            font-weight: 700;
            color: var(--accent-color);
            font-size: 1.05rem;
        }

        .dict-tooltip-ipa {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
        }

        .dict-tooltip-pos {
            font-size: 0.75rem;
            color: #818cf8;
            font-style: italic;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .dict-tooltip-trans {
            color: var(--text-zh);
            font-size: 0.9rem;
            font-weight: 400;
        }

        .word-highlight {
            color: var(--accent-color);
            font-weight: 600;
        }

        /* 隐藏单句底部的进度条，跟读时无需显示 */
        

        

        

        /* 句子结构语法分析样式 */
        .syntax-toggle {
            align-self: flex-start;
            font-size: 0.8rem;
            color: var(--accent-color);
            background: rgba(56, 189, 248, 0.08);
            border: 1px dashed rgba(56, 189, 248, 0.3);
            border-radius: 6px;
            padding: 4px 10px;
            
            margin-top: 4px;
            user-select: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .syntax-toggle:hover {
            background: rgba(56, 189, 248, 0.15);
            border-style: solid;
        }

        .syntax-content {
            display: none;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-zh);
            background: rgba(15, 23, 42, 0.3);
            border-left: 3px solid var(--accent-color);
            padding: 10px 12px;
            border-radius: 4px;
            margin-top: 6px;
            width: 100%;
            animation: fadeIn 0.3s ease;
        }

        .syntax-content p {
            margin-bottom: 6px;
        }

        .syntax-content ul {
            padding-left: 18px;
        }

        .syntax-content li {
            margin-bottom: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 底部悬浮媒体控制中心 */
        .progress-panel {
            position: fixed;
            bottom: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 2rem);
            max-width: 700px;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 1rem 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { transform: translate(-50%, 100px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        .overall-progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .overall-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-color), #818cf8);
            transition: width 0.1s linear;
        }

        .progress-controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .time-display {
            font-size: 0.95rem;
            font-variant-numeric: tabular-nums;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .time-display span {
            color: var(--text-primary);
        }

        .media-controls {
            display: flex;
            gap: 1.2rem;
        }

        .media-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .media-btn:hover {
            color: var(--accent-color);
            background: rgba(255, 255, 255, 0.05);
        }

        .media-btn#play-btn {
            background: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.3);
        }

        .media-btn#play-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .status-indicator {
            font-size: 0.85rem;
            color: var(--accent-color);
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .settings-row { grid-template-columns: 1fr 1fr; }
            .modes-row { gap: 1rem; }
            .sentence-block { padding: 1rem; }
            .en { font-size: 1.1rem; }
            .zh { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Lesson 58: A Spot of Bother</h1>
        <p class="subtitle">第 58 课：一点小麻烦</p>
    </header>

    

    <main class="text-container" id="text-container">
        <!-- 句子将被 JS 渲染在此处 -->
    </main>

    <audio id="audio-player" src="Lesson-58.mp3"></audio>

    <section class="progress-panel">
        <div class="overall-progress-container" style="cursor: pointer;">
            <div class="overall-progress-bar" id="overall-progress-bar"></div>
        </div>
        <div class="progress-controls-row">
            <div class="time-display">
                <span id="elapsed-time">00:00</span> / <span id="total-time">00:00</span>

                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/></svg>
                </button>
                <button id="play-btn" class="media-btn" title="播放/暂停">
                    <svg id="play-icon" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M11.596 8.697l-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/></svg>
                    <svg id="pause-icon" style="display:none;" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 3.5A1.5 1.5 0 0 1 7 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5zm5 0A1.5 1.5 0 0 1 12 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5z"/></svg>
                </button>
            </div>
            <div class="skip-control" style="display: flex; align-items: center; gap: 12px;">
                <label style="font-size: 0.8rem; color: var(--text-secondary); font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px;">
                    <input type="checkbox" id="skip-question" checked style="cursor: pointer;"> 跳过课前指示与提问
                </label>
                <label style="font-size: 0.8rem; color: var(--text-secondary); font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px;">

                <label style="font-size: 0.8rem; color: var(--text-secondary); font-weight: 600;">倍速:</label>
                <select id="speed-select" style="height: 30px; padding: 2px 6px; border-radius: 6px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); color: var(--text-primary); cursor: pointer;">
                    <option value="0.5">0.5x</option>
                    <option value="0.6">0.6x</option>
                    <option value="0.7">0.7x</option>
                    <option value="0.8">0.8x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1.0x</option>
                </select>
            </div>
        </div>
    </section>


    

    <script>
        const articles = [
            { start: 0, en: "Lesson 58: A Spot of Bother",
                zh: "第 58 课：一点小麻烦"
            },
            { start: 14.73, en: "The old lady was glad to be back at the block of flats where she lived.",
                zh: "这位老太太很高兴回到了她居住的那栋公寓楼。",
                syntax: {
                    main: "The old lady (主语) + was (系动词) + glad (表语)",
                    components: [
                        { part: "to be back...", role: "不定式短语作原因状语，修饰形容词 glad。" },
                        { part: "where she lived", role: "定语从句，修饰 flats。其中 where 为关系副词，在从句中作地点状语。" }
                    ]
                }
            },
            { start: 20.86, en: "Her shopping had tired her and her basket had grown heavier with every step of the way home.",
                zh: "购物使她感到疲惫，而且回家的路上，她每走一步，篮子就显得越发沉重。",
                syntax: {
                    main: "由 and 连接的两个并列分句",
                    components: [
                        { part: "分句1：Her shopping had tired her", role: "主谓宾结构。shopping (主) + had tired (谓) + her (宾)。" },
                        { part: "分句2：her basket had grown heavier", role: "主系表结构。basket (主) + had grown (系) + heavier (表)。" },
                        { part: "with every step...", role: "介词短语作状语，表示伴随状态及程度变化。" }
                    ]
                }
            },
            { start: 28.27, en: "In the lift her thoughts were on lunch and a good rest; but when she got out at her own floor, both were forgotten in her sudden discovery that her front door was open.",
                zh: "在电梯里，她想着午饭和好好休息一下；但当她在自己那一层走出电梯时，她突然发现房门大开，于是把这两件事全忘了。",
                syntax: {
                    main: "由 but 连接的并列复合句",
                    components: [
                        { part: "主句1：her thoughts were on lunch...", role: "thoughts (主) + were (谓) + on lunch... (状)。" },
                        { part: "主句2：both were forgotten...", role: "both (主) + were forgotten (谓，被动语态)。" },
                        { part: "when she got out...", role: "时间状语从句，修饰主句2。" },
                        { part: "that her front door was open", role: "同位语从句，解释说明名词 discovery 的具体内容。" }
                    ]
                }
            },
            { start: 42.07, en: "She was thinking that she must reprimand her home help the next morning for such a monstrous piece of negligence, when she remembered that she had gone shopping after the home help had left and she knew that she had turned both keys in their locks.",
                zh: "她正想着第二天早上一定要责备她的家政助理如此粗心大意，这时她想起自己是在家政助理离开后才去购物的，而且她记得自己当时把两把锁都锁上了。",
                syntax: {
                    main: "She (主) + was thinking (谓) + that宾语从句",
                    components: [
                        { part: "that she must reprimand...", role: "作 thinking 的宾语从句。" },
                        { part: "when she remembered...", role: "when 引导时间状语从句，表示“就在这时（突然发生某事）”。" },
                        { part: "that she had gone shopping...", role: "作 remembered 的宾语从句。" },
                        { part: "after the home help had left", role: "时间状语从句，修饰 had gone shopping。" },
                        { part: "and she knew that...", role: "并列的从属主句。that 从句作 knew 的宾语从句。" }
                    ]
                }
            },
            { start: 60.63, en: "She walked slowly into the hall and at once noticed that all the room doors were open, yet following her regular practice she had shut them before going out.",
                zh: "她慢慢走进门厅，立刻注意到所有的房门都开着，然而按照惯例，她在出门前是把它们都关好的。",
                syntax: {
                    main: "由 yet 连接的并列句",
                    components: [
                        { part: "分句1：She walked... and noticed that...", role: "walked 与 noticed 是并列谓语，that 从句作 noticed 的宾语从句。" },
                        { part: "分句2：she had shut them before going out", role: "she (主) + had shut (谓) + them (宾)。" },
                        { part: "following her regular practice", role: "现在分词短语作伴随状语。" },
                        { part: "before going out", role: "介词短语作时间状语。" }
                    ]
                }
            },
            { start: 72.69, en: "Looking into the drawing room, she saw a scene of confusion over by her writing desk.",
                zh: "她朝客厅里望去，看到写字台那边一片狼藉。",
                syntax: {
                    main: "she (主) + saw (谓) + a scene of confusion (宾)",
                    components: [
                        { part: "Looking into...", role: "现在分词短语作时间/伴随状语。" },
                        { part: "over by her writing desk", role: "介词短语作后置定语，修饰 confusion。" }
                    ]
                }
            },
            { start: 79.28, en: "It was as clear as daylight then that burglars had forced an entry during her absence.",
                zh: "那时她完全明白了，在她外出期间，窃贼强行闯入了家中。",
                syntax: {
                    main: "It (形式主语) + was (系) + as clear as daylight (表) + that主语从句 (真正主语)",
                    components: [
                        { part: "that burglars had forced...", role: "that 引导的从句是真正的主语，it 仅作形式主语。" },
                        { part: "during her absence", role: "介词短语作时间状语。" }
                    ]
                }
            },
            { start: 85.89, en: "Her first impulse was to go round all the rooms looking for the thieves, but then she decided that at her age it might be more prudent to have someone with her, so she went to fetch the porter from his basement.",
                zh: "她的第一反应是到各个房间去搜寻窃贼，但随后她觉得以自己的年纪，找个人陪同会更稳妥些，于是她去地下室找来了门房。",
                syntax: {
                    main: "由 but 和 so 连接的并列复合句",
                    components: [
                        { part: "分句1：Her first impulse was to go...", role: "to go round... 不定式短语作表语；looking for... 现在分词作目的状语。" },
                        { part: "分句2：she decided that...", role: "that 从句作 decided 的宾语从句。从句中 it 为形式主语，真正主语是 to have someone with her。" },
                        { part: "分句3：she went to fetch the porter...", role: "so 引导结果状语分句。to fetch... 不定式短语作目的状语。" }
                    ]
                }
            },
            { start: 101.71, en: "By this time her legs were beginning to tremble, so she sat down and accepted a cup of very strong tea, while he telephoned the police.",
                zh: "这时她的双腿开始发抖，于是她坐下来喝了一杯浓茶，而门房则打电话报了警。",
                syntax: {
                    main: "由 so 引导的并列结果句",
                    components: [
                        { part: "分句1：her legs were beginning to tremble", role: "legs (主) + were beginning (谓) + to tremble (宾，不定式)。" },
                        { part: "分句2：she sat down and accepted a cup...", role: "she (主) + 并列谓语 (sat down, accepted) + cup (宾)。" },
                        { part: "while he telephoned...", role: "while 引导时间状语从句，表示对比或伴随动作。" }
                    ]
                }
            },
            { start: 112.27, en: "Then, her composure regained, she was ready to set off with the porter's assistance to search for any intruders who might still be lurking in her flat.",
                zh: "随后，她恢复了镇定，准备在门房的协助下出发，搜寻可能仍潜伏在她公寓里的入侵者。",
                syntax: {
                    main: "she (主) + was (系) + ready (表) + to set off (状)",
                    components: [
                        { part: "her composure regained", role: "独立主格结构，表示伴随状态或时间。" },
                        { part: "to search for...", role: "不定式短语作目的状语。" },
                        { part: "who might still be lurking...", role: "who 引导定语从句，修饰先行词 intruders。" }
                    ]
                }
            },
            { start: 124.54, en: "They went through the rooms, being careful to touch nothing, as they did not want to hinder the police in their search for fingerprints.",
                zh: "他们走遍了各个房间，小心翼翼地什么都不碰，因为他们不想妨碍警察寻找指纹。",
                syntax: {
                    main: "They (主) + went through (谓) + the rooms (宾)",
                    components: [
                        { part: "being careful to touch nothing", role: "现在分词短语作伴随状语。" },
                        { part: "as they did not want...", role: "as 引导原因状语从句。" },
                        { part: "in their search for...", role: "介词短语作后置定语或目的状语。" }
                    ]
                }
            },
            { start: 133.88, en: "The chaos was inconceivable.",
                zh: "屋里乱得难以想象。",
                syntax: {
                    main: "The chaos (主) + was (系) + inconceivable (表)"
                }
            },
            { start: 137.27, en: "She had lived in the flat for thirty years and was a veritable magpie at hoarding: and it seemed as though everything she possessed had been tossed out and turned over and over.",
                zh: "她在这套公寓里住了三十年，是个十足的“积攒狂”：看起来她所有的东西都被翻了出来，翻得底朝天。",
                syntax: {
                    main: "由并列连接符 : 连接的并列复合句",
                    components: [
                        { part: "分句1：She had lived... and was...", role: "She 为主语，had lived (谓) 与 was (系) 并列。for thirty years 作时间状语。" },
                        { part: "分句2：it seemed as though...", role: "it (主) + seemed (谓) + as though 引导的表语从句。" },
                        { part: "everything she possessed had been...", role: "she possessed 是省略了关系代词的定语从句，修饰 everything。" }
                    ]
                }
            },
            { start: 151.08, en: "At least sorting out the things she should have discarded years ago was now being made easier for her.",
                zh: "至少，清理那些她多年前就该扔掉的东西现在变得容易了。",
                syntax: {
                    main: "sorting out... (动名词作主语) + was now being made (谓，进行被动) + easier (表，宾补移位)",
                    components: [
                        { part: "sorting out the things", role: "动名词短语在主句中作主语。" },
                        { part: "she should have discarded...", role: "定语从句修饰 things。should have + 过去分词表示“本该做某事（但没做）”，带虚拟语气。" }
                    ]
                }
            },
            { start: 158.73, en: "Then a police inspector arrived with a constable and she told them of her discovery of the ransacked flat.",
                zh: "接着，一位警督带着一名警员赶到了，她向他们讲述了自己发现公寓被洗劫一事。",
                syntax: {
                    main: "由 and 连接的并列主从句",
                    components: [
                        { part: "分句1：a police inspector arrived", role: "arrived (谓)，with a constable 作伴随状语。" },
                        { part: "分句2：she told them of...", role: "she (主) + told (谓) + them (宾) + of her discovery (状)。" }
                    ]
                }
            },
            { start: 167.15, en: "The inspector began to look for fingerprints, while the constable checked that the front door locks had not been forced, thereby proving that the burglars had either used skeleton keys or entered over the balcony.",
                zh: "警督开始寻找指纹，而警员则检查了前门的锁是否被撬过，从而证明窃贼要么是用了万能钥匙，要么是从阳台闯入的。",
                syntax: {
                    main: "The inspector (主) + began (谓) + to look for... (宾)",
                    components: [
                        { part: "while the constable checked...", role: "while 引导时间/对比状语从句。" },
                        { part: "that the front door locks...", role: "that 引导宾语从句作 checked 的宾语。" },
                        { part: "thereby proving that...", role: "现在分词短语作伴随结果状语。that 从句作 proving 的宾语从句。" }
                    ]
                }
            },
            { start: 182.03, en: "There was no trace of fingerprints, but the inspector found a dirty red bundle that contained jewellery which the old lady said was not hers.",
                zh: "现场没有留下指纹，但警督发现了一个肮脏的红色包裹，里面装着一些珠宝，老太太说那不是她的。",
                syntax: {
                    main: "由 but 连接的并列句",
                    components: [
                        { part: "分句1：There was no trace...", role: "there be 存在句，no trace 为主语。" },
                        { part: "分句2：the inspector found a bundle", role: "inspector (主) + found (谓) + bundle (宾)。" },
                        { part: "that contained jewellery...", role: "that 引导定语从句，修饰 bundle。" },
                        { part: "which the old lady said was not hers", role: "which 引导定语从句修饰 jewellery，其中 the old lady said 为插入语。" }
                    ]
                }
            },
            { start: 193.07, en: "So their entry into this flat was apparently not the burglars' first job that day and they must have been disturbed.",
                zh: "看来他们闯入这套公寓显然不是当天作的第一起案子，而且他们一定是被人惊动了。",
                syntax: {
                    main: "由 and 连接的并列句",
                    components: [
                        { part: "分句1：their entry... was not the first job", role: "entry (主) + was (系) + job (表)。into this flat 作定语。" },
                        { part: "分句2：they must have been disturbed", role: "they (主) + must have been disturbed (推测性被动谓语)。" }
                    ]
                }
            },
            { start: 201.84, en: "The inspector then asked the old lady to try to check what was missing by the next day, and advised her not to stay alone in the flat for a few nights.",
                zh: "警督随后请老太太尽量在第二天前核对一下丢失了什么东西，并建议她这几天晚上不要独自待在公寓里。",
                syntax: {
                    main: "The inspector (主) + 并列谓语 (asked, advised)",
                    components: [
                        { part: "asked the old lady to try...", role: "the old lady (宾) + to try... (宾补，复合宾语结构)。" },
                        { part: "what was missing", role: "宾语从句，作 check 的宾语。" },
                        { part: "advised her not to stay...", role: "her (宾) + not to stay... (宾补)。" }
                    ]
                }
            },
            { start: 212.11, en: "The old lady thought he was a fussy creature, but since the porter agreed with him, she rang up her daughter and asked for her help in what she described as a little spot of bother.",
                zh: "老太太觉得他真是个爱操心的人，但既然门房也同意他的看法，她便给女儿打了电话，请她来帮自己处理她所说的“一点小麻烦”。",
                syntax: {
                    main: "由 but 连接的并列复合句",
                    components: [
                        { part: "分句1：The old lady thought...", role: "thought 的宾语是省略了 that 的宾语从句 he was a fussy creature。" },
                        { part: "since the porter agreed...", role: "since 引导原因状语从句。" },
                        { part: "分句2：she rang up... and asked for...", role: "she (主) + 并列谓语 (rang up, asked for) + 宾语。" },
                        { part: "in what she described as...", role: "what 引导的名词性从句，作介词 in 的宾语。" }
                    ]
                }
            }
        ];

        const textContainer = document.getElementById('text-container');
        const audioPlayer = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const overallProgressContainer = document.querySelector('.overall-progress-container');
        const overallProgressBar = document.getElementById('overall-progress-bar');
        const elapsedTimeEl = document.getElementById('elapsed-time');
        const totalTimeEl = document.getElementById('total-time');
        const speedSelect = document.getElementById('speed-select');

        let currentActiveIndex = -1;

        // format seconds to mm:ss
        function formatTime(secs) {
            if (isNaN(secs)) return '00:00';
            const m = Math.floor(secs / 60).toString().padStart(2, '0');
            const s = Math.floor(secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        const skipQuestionCheckbox = document.getElementById('skip-question');
        const loopPlaybackCheckbox = document.getElementById('loop-playback');
        let isSeekingSkip = false;

        function getEffectiveTimes() {
            const rawCurrent = audioPlayer.currentTime || 0;
            const rawDuration = audioPlayer.duration || 0;
            const rate = audioPlayer.playbackRate || 1.0;
            const isSkipping = skipQuestionCheckbox && skipQuestionCheckbox.checked;
            
            const headSkipDuration = 10.23; // 14.73 - 4.50
            const tailSkipDuration = 7.0;   // 227.0 - 234.0
            const totalSkipDuration = headSkipDuration + tailSkipDuration;

            let effectiveCurrent = rawCurrent;
            let effectiveDuration = isSkipping ? Math.max(0, rawDuration - totalSkipDuration) : rawDuration;

            if (isSkipping) {
                if (rawCurrent >= 227.0) {
                    effectiveCurrent = Math.max(0, rawDuration - totalSkipDuration);
                } else if (rawCurrent >= 14.73) {
                    effectiveCurrent = rawCurrent - headSkipDuration;
                } else if (rawCurrent > 4.5) {
                    effectiveCurrent = 4.5;
                }
            }

            return {
                current: effectiveCurrent / rate,
                duration: effectiveDuration / rate,
                pct: effectiveDuration > 0 ? Math.min(100, (effectiveCurrent / effectiveDuration) * 100) : 0
            };
        }

        function updateTimeDisplays() {
            const times = getEffectiveTimes();
            overallProgressBar.style.width = `${times.pct}%`;
            elapsedTimeEl.textContent = formatTime(times.current);
            totalTimeEl.textContent = formatTime(times.duration);
        }

        function handlePlaybackEnd() {
            if (loopPlaybackCheckbox && loopPlaybackCheckbox.checked) {
                audioPlayer.currentTime = 0;
                audioPlayer.play();
            } else {
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
                setActiveBlock(-1);
                updateTimeDisplays();
            }
        }

        audioPlayer.addEventListener('ended', () => {
            handlePlaybackEnd();
        });

        // update progress panel
        audioPlayer.addEventListener('timeupdate', () => {
            const current = audioPlayer.currentTime;
            const isSkipping = skipQuestionCheckbox && skipQuestionCheckbox.checked;
            
            // 1. 自动跳过 4.5s 到 14.7s 之间的 Listen to the tape 指令及课前提问部分 (节省跟读时间)
            if (isSkipping && current >= 4.5 && current < 14.7 && !isSeekingSkip) {
                isSeekingSkip = true;
                audioPlayer.currentTime = 14.73;
                setTimeout(() => { isSeekingSkip = false; }, 300);
                return;
            }

            // 2. 结尾最后一句读完 (227.0s) 后：若开启循环播放则重置并继续播放，否则暂停重置
            if (isSkipping && current >= 227.0 && !audioPlayer.paused && !isSeekingSkip) {
                isSeekingSkip = true;
                handlePlaybackEnd();
                setTimeout(() => { isSeekingSkip = false; }, 500);
                return;
            }

            updateTimeDisplays();

            // update current sentence highlight
            let activeIdx = -1;
            for (let i = 0; i < articles.length; i++) {
                if (current >= articles[i].start) {
                    activeIdx = i;
                } else {
                    break;
                }
            }

            if (activeIdx !== currentActiveIndex) {
                currentActiveIndex = activeIdx;
                setActiveBlock(currentActiveIndex);
            }
        });

        skipQuestionCheckbox.addEventListener('change', () => {
            updateTimeDisplays();
        });

        // seek on progress bar click
        overallProgressContainer.addEventListener('click', (e) => {
            const rect = overallProgressContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            const pct = clickX / width;
            const isSkipping = skipQuestionCheckbox && skipQuestionCheckbox.checked;
            const headSkipDuration = 10.23;
            const tailSkipDuration = 7.0;
            const totalSkipDuration = headSkipDuration + tailSkipDuration;
            const rawDuration = audioPlayer.duration || 0;

            if (rawDuration > 0) {
                let targetEffective = pct * (isSkipping ? Math.max(0, rawDuration - totalSkipDuration) : rawDuration);
                let targetRaw = targetEffective;
                if (isSkipping && targetEffective >= 4.5) {
                    targetRaw = targetEffective + headSkipDuration;
                }
                audioPlayer.currentTime = targetRaw;
            }
        });

        const restartBtn = document.getElementById('restart-btn');
        restartBtn.addEventListener('click', () => {
            audioPlayer.currentTime = 0;
            audioPlayer.play();
        });

        // play/pause audio
        playBtn.addEventListener('click', () => {
            if (audioPlayer.paused) {
                audioPlayer.play();
            } else {
                audioPlayer.pause();
            }
        });

        audioPlayer.addEventListener('play', () => {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
        });

        audioPlayer.addEventListener('pause', () => {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        });

        // speed control
        speedSelect.addEventListener('change', () => {
            const rate = parseFloat(speedSelect.value);
            audioPlayer.playbackRate = rate;
            updateTimeDisplays();
        });

        function setActiveBlock(index) {
            document.querySelectorAll('.sentence-block').forEach((block, i) => {
                if (i === index) {
                    block.classList.add('active');
                    block.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    block.classList.remove('active');
                }
            });
        }

        const synth = window.speechSynthesis;
        let voices = [];

        function speakWord(wordText) {
            synth.cancel();
            const cleanWord = wordText.replace(/[^a-zA-Z0-9'-]/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanWord);
            if (voices.length === 0) {
                voices = synth.getVoices();
            }
            const samantha = voices.find(v => v.name.includes('Samantha'));
            if (samantha) {
                utterance.voice = samantha;
            } else {
                const enVoice = voices.find(v => v.lang.toLowerCase().startsWith('en'));
                if (enVoice) utterance.voice = enVoice;
            }
            utterance.rate = 0.6;
            synth.speak(utterance);
        }

        
        // 将英文句子格式化为带有字符偏移定位的单词<span>标签
        function renderSentenceHTML(text) {
            const regex = /([a-zA-Z0-9]+(?:[-'][a-zA-Z0-9]+)*)|([^\s\w]+)|(\s+)/g;
            let match;
            let html = '';
            
            regex.lastIndex = 0;
            while ((match = regex.exec(text)) !== null) {
                const token = match[0];
                const word = match[1];
                const start = match.index;
                const end = regex.lastIndex;
                
                if (word) {
                    html += `<span class="word" data-start="${start}" data-end="${end}">${token}</span>`;
                } else {
                    html += `<span>${token}</span>`;
                }
            }
            return html;
        }

        // 渲染文本块
        function renderText() {
            textContainer.innerHTML = '';
            articles.forEach((item, index) => {
                const block = document.createElement('div');
                block.className = 'sentence-block';
                block.dataset.index = index;
                
                let syntaxHTML = '';
                if (item.syntax) {
                    syntaxHTML = `
                        <div class="syntax-toggle">📌 语法分析 / Grammar Breakdown</div>
                        <div class="syntax-content">
                            <p><strong>句子主干：</strong>${item.syntax.main}</p>
                            <ul>
                                ${item.syntax.components ? item.syntax.components.map(c => `<li><strong>${c.part}</strong>: ${c.role}</li>`).join('') : ''}
                            </ul>
                        </div>
                    `;
                }

                block.innerHTML = `
                    <p class="en">${renderSentenceHTML(item.en)}</p>
                    <p class="zh">${item.zh}</p>
                    ${syntaxHTML}
                `;

                // click block to play audio from sentence start
                block.addEventListener('click', () => {
                    audioPlayer.currentTime = item.start;
                    audioPlayer.play();
                });

                block.querySelectorAll('.word').forEach(wordSpan => {
                    wordSpan.addEventListener('click', (e) => {
                        e.stopPropagation();
                        speakWord(e.target.textContent);
                    });
                });

                const toggleBtn = block.querySelector('.syntax-toggle');
                if (toggleBtn) {
                    toggleBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const content = toggleBtn.nextElementSibling;
                        if (content.style.display === 'block') {
                            content.style.display = 'none';
                            toggleBtn.innerHTML = '📌 语法分析 / Grammar Breakdown';
                        } else {
                            content.style.display = 'block';
                            toggleBtn.innerHTML = '⚡️ 收起分析 / Close Breakdown';
                        }
                    });
                }
                
                textContainer.appendChild(block);
            });
        }


        // 释义浮窗逻辑
        const tooltip = document.createElement('div');
        tooltip.className = 'dict-tooltip';
        tooltip.innerHTML = `
            <div class="dict-word-row">
                <span class="dict-tooltip-word"></span>
                <span class="dict-tooltip-ipa"></span>
            </div>
            <div class="dict-tooltip-pos"></div>
            <div class="dict-tooltip-trans"></div>
        `;
        document.body.appendChild(tooltip);

        let hoverTimeout = null;
        let dictCache = {};

        textContainer.addEventListener('mouseover', (e) => {
            const wordSpan = e.target.closest('.word');
            if (!wordSpan) return;

            const word = wordSpan.textContent.replace(/[^a-zA-Z0-9'-]/g, '').toLowerCase();
            if (!word) return;

            clearTimeout(hoverTimeout);
            hoverTimeout = setTimeout(() => {
                showTooltip(wordSpan, word);
            }, 300); // 300ms 悬浮延迟，防止划过时频繁触发
        });

        textContainer.addEventListener('mouseout', (e) => {
            const wordSpan = e.target.closest('.word');
            if (!wordSpan) return;
            clearTimeout(hoverTimeout);
            hideTooltip();
        });

        function showTooltip(target, word) {
            const rect = target.getBoundingClientRect();
            const tooltipWord = tooltip.querySelector('.dict-tooltip-word');
            const tooltipIpa = tooltip.querySelector('.dict-tooltip-ipa');
            const tooltipPos = tooltip.querySelector('.dict-tooltip-pos');
            const tooltipTrans = tooltip.querySelector('.dict-tooltip-trans');

            tooltipWord.textContent = word;
            tooltipIpa.textContent = "";
            tooltipPos.textContent = "";
            tooltipTrans.textContent = "正在查询...";
            
            tooltip.classList.add('visible');
            adjustTooltipPosition(target);

            if (dictCache[word]) {
                const cached = dictCache[word];
                tooltipIpa.textContent = cached.ipa;
                tooltipPos.textContent = cached.pos;
                tooltipTrans.textContent = cached.trans;
                adjustTooltipPosition(target);
            } else {
                Promise.all([
                    fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=${encodeURIComponent(word)}`).then(res => res.json()),
                    fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`).then(res => res.json()).catch(() => null)
                ])
                .then(([transData, dictData]) => {
                    const trans = transData[0][0][0];
                    let ipa = "";
                    let pos = "";
                    
                    if (dictData && dictData[0]) {
                        ipa = dictData[0].phonetic || (dictData[0].phonetics && dictData[0].phonetics.find(p => p.text)?.text) || "";
                        if (dictData[0].meanings) {
                            const parts = dictData[0].meanings.map(m => m.partOfSpeech);
                            pos = [...new Set(parts)].join(', ');
                        }
                    }
                    
                    const result = { ipa, pos, trans };
                    dictCache[word] = result;
                    
                    if (tooltipWord.textContent === word) {
                        tooltipIpa.textContent = ipa;
                        tooltipPos.textContent = pos;
                        tooltipTrans.textContent = trans;
                        adjustTooltipPosition(target);
                    }
                })
                .catch(() => {
                    if (tooltipWord.textContent === word) {
                        tooltipTrans.textContent = "查询失败";
                    }
                });
            }
        }

        function adjustTooltipPosition(target) {
            const rect = target.getBoundingClientRect();
            const tooltipRect = tooltip.getBoundingClientRect();
            const left = rect.left + (rect.width - tooltipRect.width) / 2 + window.scrollX;
            const top = rect.top - tooltipRect.height - 8 + window.scrollY;
            tooltip.style.left = `${Math.max(10, left)}px`;
            tooltip.style.top = `${top}px`;
        }

        function hideTooltip() {
            tooltip.classList.remove('visible');
        }

        renderText();
        
        
    </script>
</body>
</html>
