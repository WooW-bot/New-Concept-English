<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 59: Collecting - 智能跟读课本</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-zh: #cbd5e1;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --highlight-bg: rgba(56, 189, 248, 0.15);
            --highlight-border: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.08) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        header {
            width: 100%;
            max-width: 900px;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        /* 句子列表 */
        .text-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sentence-block {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1.2rem;
            
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        

        /* 句子结构语法分析样式 */
        .syntax-toggle {
            align-self: flex-start;
            font-size: 0.8rem;
            color: var(--accent-color);
            background: rgba(56, 189, 248, 0.08);
            border: 1px dashed rgba(56, 189, 248, 0.3);
            border-radius: 6px;
            padding: 4px 10px;
            
            margin-top: 4px;
            user-select: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .syntax-toggle:hover {
            background: rgba(56, 189, 248, 0.15);
            border-style: solid;
        }

        .syntax-content {
            display: none;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-zh);
            background: rgba(15, 23, 42, 0.3);
            border-left: 3px solid var(--accent-color);
            padding: 10px 12px;
            border-radius: 4px;
            margin-top: 6px;
            width: 100%;
            animation: fadeIn 0.3s ease;
        }

        .syntax-content p {
            margin-bottom: 6px;
        }

        .syntax-content ul {
            padding-left: 18px;
        }

        .syntax-content li {
            margin-bottom: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .en {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 0.5rem;
            font-weight: 400;
            letter-spacing: 0.01em;
            color: var(--text-primary);
        }

        .sentence-block.active .en {
            color: #fff;
        }

        /* 单个单词交互样式 */
        .word {
            display: inline-block;
            
            transition: all 0.15s ease;
            border-radius: 4px;
            padding: 0 2px;
            margin: 0 -1px;
        }

        .word:hover {
            color: var(--accent-color);
            background: rgba(56, 189, 248, 0.15);
            text-decoration: underline;
        }

        /* 悬浮单词释义卡片 */
        .dict-tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 10px 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            color: var(--text-primary);
            z-index: 2000;
            pointer-events: none;
            display: none;
            opacity: 0;
            transform: translateY(5px);
            transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1), transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 180px;
            max-width: 260px;
            line-height: 1.4;
        }
        
        .dict-tooltip.visible {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .dict-word-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 4px;
        }

        .dict-tooltip-word {
            font-weight: 700;
            color: var(--accent-color);
            font-size: 1.05rem;
        }

        .dict-tooltip-ipa {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
        }

        .dict-tooltip-pos {
            font-size: 0.75rem;
            color: #818cf8;
            font-style: italic;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .dict-tooltip-trans {
            color: var(--text-zh);
            font-size: 0.9rem;
            font-weight: 400;
        }

        .word.word-highlight {
            color: #0f172a !important;
            background: var(--accent-color) !important;
            font-weight: 600;
            box-shadow: 0 0 8px var(--accent-color);
        }

        .zh {
            font-size: 0.95rem;
            color: var(--text-zh);
            line-height: 1.5;
        }

        .badge {
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent-color);
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            margin-bottom: 0.5rem;
            display: inline-block;
            font-weight: 600;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            
            transition: color 0.2s ease;
        }

        .checkbox-container:hover {
            color: var(--text-primary);
        }

        .checkbox-container input {
            accent-color: var(--accent-color);
            
            width: 15px;
            height: 15px;
        }

        @media (max-width: 768px) {
            .progress-panel { flex-direction: column; align-items: stretch; gap: 0.8rem; border-radius: 0; }
            .modes-row { gap: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <span class="badge">New Concept English 3</span>
        <h1>Lesson 59: Collecting</h1>
        <p class="subtitle">第 59 课：收藏</p>
    </header>

    

    

    <main class="text-container" id="text-container">
        <!-- 句子将被 JS 渲染在此处 -->
    </main>

    <script>
        const articles = [
            {
                en: "Lesson 59: Collecting",
                zh: "第 59 课：收藏"
            },
            {
                en: "People tend to amass possessions, sometimes without being aware of doing so.",
                zh: "人们往往会积攒物品，有时甚至自己都没有意识到。"
            },
            {
                en: "Indeed they can have a delightful surprise when they find something useful which they did not know they owned.",
                zh: "事实上，当他们发现自己竟拥有某件有用的东西而此前却一无所知时，会感到一种意外的惊喜。"
            },
            {
                en: "Those who never have to move house become indiscriminate collectors of what can only be described as clutter.",
                zh: "那些从不需要搬家的人，会不加选择地收集各种只能被称作“杂物”的东西。"
            },
            {
                en: "They leave unwanted objects in drawers, cupboards and attics for years, in the belief that they may one day need just those very things.",
                zh: "他们把不需要的物品留在抽屉、橱柜和阁楼里，一放就是多年，总以为有一天会用得上这些东西。"
            },
            {
                en: "As they grow old, people also accumulate belongings for two other reasons, lack of physical and mental energy, both of which are essential in turning out and throwing away, and sentiment.",
                zh: "随着年龄的增长，人们还会因为另外两个原因而积攒物品：一是缺乏清理和丢弃物品所必需的精力和体力，二是出于情感因素。"
            },
            {
                en: "Things owned for a long time are full of associations with the past, perhaps with relatives who are dead, and so they gradually acquire a value beyond their true worth.",
                zh: "长期拥有的物品充满了与过去的回忆，或许是与已故亲人的联系，因此它们逐渐获得了一种超越其本身价值的意义。"
            },
            {
                en: "Some things are collected deliberately in the home in an attempt to avoid waste.",
                zh: "有些东西被刻意地留在家里，是为了避免浪费。"
            },
            {
                en: "Among these I would list string and brown paper, kept by thrifty people when a parcel has been opened, to save buying these two requisites.",
                zh: "在这些东西中，我会列出绳子和包装纸，节俭的人在拆开包裹后会把它们留下来，以省去购买这两样必需品的开销。"
            },
            {
                en: "Collecting small items can easily become a mania.",
                zh: "收集小物件很容易变成一种癖好。"
            },
            {
                en: "I know someone who always cuts sketches out from newspapers of model clothes that she would like to buy if she had the money.",
                zh: "我认识一个人，她总是把报纸上那些她有钱就想买的时装草图剪下来。"
            },
            {
                en: "As she is not rich, the chances that she will ever be able to afford such purchases are remote; but she is never sufficiently strongminded to be able to stop the practice.",
                zh: "由于她并不富有，她能买得起这些东西的可能性微乎其微；但她又不够坚决，无法停止这种做法。"
            },
            {
                en: "It is a harmless habit, but it litters up her desk to such an extent that every time she opens it, loose bits of paper fall out in every direction.",
                zh: "这是一种无害的习惯，但却把她的书桌弄得乱七八糟，以至于每次她打开书桌，零散的纸片就会四处散落。"
            },
            {
                en: "Collecting as a serious hobby is quite different and has many advantages.",
                zh: "作为一种严肃的爱好，收藏则完全不同，而且有很多好处。"
            },
            {
                en: "It provides relaxation for leisure hours, as just looking at one's treasures is always a joy.",
                zh: "它为闲暇时光提供了放松，因为仅仅是看着自己的宝贝总是一种乐趣。"
            },
            {
                en: "One does not have to go outside for amusement, since the collection is housed at home.",
                zh: "人们不必出门寻找娱乐，因为收藏品就存放在家里。",
                syntax: {
                    main: "One (主语) + does not have to go (谓语) + outside (状语)",
                    components: [
                        { part: "for amusement", role: "目的状语。" },
                        { part: "since the collection is housed at home", role: "since 引导原因状语从句。其中 is housed 为被动语态。" }
                    ]
                }
            },
            {
                en: "Whatever it consists of, stamps, records, first editions of books, china, glass, antique furniture, pictures, model cars, stuffed birds, toy animals, there is always something to do in connection with it, from finding the right place for the latest addition, to verifying facts in reference books.",
                zh: "无论收藏的是什么——邮票、唱片、书籍初版、瓷器、玻璃制品、古董家具、画作、汽车模型、鸟类标本还是玩具动物——总有与之相关的事情可做，从为新添的藏品寻找合适的位置，到在参考书中核实相关事实。",
                syntax: {
                    main: "there (引导词) + is (谓语) + something (主语) + to do (后置定语)",
                    components: [
                        { part: "Whatever it consists of...", role: "Whatever 引导让步状语从句， staps... 等名词为其同位语。" },
                        { part: "in connection with it", role: "介词短语作后置定语修饰 something。" },
                        { part: "from finding... to verifying...", role: "介词短语作补充状语，表示范围的延伸。" }
                    ]
                }
            },
            {
                en: "This hobby educates one not only in the chosen subject, but also in general matters which have some bearing on it.",
                zh: "这种爱好不仅能让人在所选领域获得知识，还能让人了解与之相关的一般性知识。",
                syntax: {
                    main: "This hobby (主语) + educates (谓语) + one (宾语)",
                    components: [
                        { part: "not only in the chosen subject, but also in general matters", role: "并列结构作范围状语。" },
                        { part: "which have some bearing on it", role: "which 引导定语从句，修饰 general matters。" }
                    ]
                }
            },
            {
                en: "There are also other benefits.",
                zh: "还有其他好处。",
                syntax: {
                    main: "There (引导词) + are (谓语) + other benefits (主语)"
                }
            },
            {
                en: "One wants to meet like-minded collectors, to get advice, to compare notes, to exchange articles, to show off the latest find.",
                zh: "人们想要结识志同道合的收藏者，寻求建议、交流心得、交换藏品、炫耀最新的收获。"
            },
            {
                en: "So one's circle of friends grows.",
                zh: "于是，朋友圈子就扩大了。"
            },
            {
                en: "Soon the hobby leads to travel, perhaps to a meeting in another town, possibly a trip abroad in search of a rare specimen, for collectors are not confined to any one country.",
                zh: "很快，这种爱好会促使人们去旅行，或许是去另一个城市参加聚会，或许是去国外寻找稀有的藏品，因为收藏者并不局限于任何一个国家。"
            },
            {
                en: "Over the years, one may well become an authority on one's hobby and will very probably be asked to give informal talks to little gatherings and then, if successful, to larger audiences.",
                zh: "多年以后，一个人很可能会成为自己爱好领域的权威，并很可能被邀请在小型聚会上做非正式演讲，如果成功的话，还会被邀请向更多的听众演讲。"
            },
            {
                en: "In this way self-confidence grows, first from mastering a subject, then from being able to talk about it.",
                zh: "通过这种方式，自信心增强了，首先来自于对某一学科的精通，然后来自于能够谈论它。"
            },
            {
                en: "Collecting, by occupying spare time so constructively, makes a person contented, with no time for boredom.",
                zh: "收藏通过如此有建设性地占用业余时间，使人感到满足，没有时间去感到无聊。"
            }
        ];

        const textContainer = document.getElementById('text-container');

        const synth = window.speechSynthesis;
        let voices = [];

        function speakWord(wordText) {
            synth.cancel();
            const cleanWord = wordText.replace(/[^a-zA-Z0-9'-]/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanWord);
            if (voices.length === 0) {
                voices = synth.getVoices();
            }
            const samantha = voices.find(v => v.name.includes('Samantha'));
            if (samantha) {
                utterance.voice = samantha;
            } else {
                const enVoice = voices.find(v => v.lang.toLowerCase().startsWith('en'));
                if (enVoice) utterance.voice = enVoice;
            }
            utterance.rate = 0.6;
            synth.speak(utterance);
        }

        // 将英文句子格式化为带有字符偏移定位的单词<span>标签
        function renderSentenceHTML(text) {
            const regex = /([a-zA-Z0-9]+(?:[-'][a-zA-Z0-9]+)*)|([^\s\w]+)|(\s+)/g;
            let match;
            let html = '';
            
            regex.lastIndex = 0;
            while ((match = regex.exec(text)) !== null) {
                const token = match[0];
                const word = match[1];
                const start = match.index;
                const end = regex.lastIndex;
                
                if (word) {
                    html += `<span class="word" data-start="${start}" data-end="${end}">${token}</span>`;
                } else {
                    html += `<span>${token}</span>`;
                }
            }
            return html;
        }

        // 渲染文本块
        function renderText() {
            textContainer.innerHTML = '';
            articles.forEach((item, index) => {
                const block = document.createElement('div');
                block.className = 'sentence-block';
                block.dataset.index = index;
                
                let syntaxHTML = '';
                if (item.syntax) {
                    syntaxHTML = `
                        <div class="syntax-toggle">📌 语法分析 / Grammar Breakdown</div>
                        <div class="syntax-content">
                            <p><strong>句子主干：</strong>${item.syntax.main}</p>
                            <ul>
                                ${item.syntax.components ? item.syntax.components.map(c => `<li><strong>${c.part}</strong>: ${c.role}</li>`).join('') : ''}
                            </ul>
                        </div>
                    `;
                }

                block.innerHTML = `
                    <p class="en">${renderSentenceHTML(item.en)}</p>
                    <p class="zh">${item.zh}</p>
                    ${syntaxHTML}
                `;

                block.querySelectorAll('.word').forEach(wordSpan => {
                    wordSpan.addEventListener('click', (e) => {
                        e.stopPropagation();
                        speakWord(e.target.textContent);
                    });
                });

                const toggleBtn = block.querySelector('.syntax-toggle');
                if (toggleBtn) {
                    toggleBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const content = toggleBtn.nextElementSibling;
                        if (content.style.display === 'block') {
                            content.style.display = 'none';
                            toggleBtn.innerHTML = '📌 语法分析 / Grammar Breakdown';
                        } else {
                            content.style.display = 'block';
                            toggleBtn.innerHTML = '⚡️ 收起分析 / Close Breakdown';
                        }
                    });
                }
                
                textContainer.appendChild(block);
            });
        }

        renderText();

        // 释义浮窗逻辑
        const tooltip = document.createElement('div');
        tooltip.className = 'dict-tooltip';
        tooltip.innerHTML = `
            <div class="dict-word-row">
                <span class="dict-tooltip-word"></span>
                <span class="dict-tooltip-ipa"></span>
            </div>
            <div class="dict-tooltip-pos"></div>
            <div class="dict-tooltip-trans"></div>
        `;
        document.body.appendChild(tooltip);

        let hoverTimeout = null;
        let dictCache = {};

        textContainer.addEventListener('mouseover', (e) => {
            const wordSpan = e.target.closest('.word');
            if (!wordSpan) return;

            const word = wordSpan.textContent.replace(/[^a-zA-Z0-9'-]/g, '').toLowerCase();
            if (!word) return;

            clearTimeout(hoverTimeout);
            hoverTimeout = setTimeout(() => {
                showTooltip(wordSpan, word);
            }, 300); // 300ms 悬浮延迟，防止划过时频繁触发
        });

        textContainer.addEventListener('mouseout', (e) => {
            const wordSpan = e.target.closest('.word');
            if (!wordSpan) return;
            clearTimeout(hoverTimeout);
            hideTooltip();
        });

        function showTooltip(target, word) {
            const rect = target.getBoundingClientRect();
            const tooltipWord = tooltip.querySelector('.dict-tooltip-word');
            const tooltipIpa = tooltip.querySelector('.dict-tooltip-ipa');
            const tooltipPos = tooltip.querySelector('.dict-tooltip-pos');
            const tooltipTrans = tooltip.querySelector('.dict-tooltip-trans');

            tooltipWord.textContent = word;
            tooltipIpa.textContent = "";
            tooltipPos.textContent = "";
            tooltipTrans.textContent = "正在查询...";
            
            tooltip.classList.add('visible');
            adjustTooltipPosition(target);

            if (dictCache[word]) {
                const cached = dictCache[word];
                tooltipIpa.textContent = cached.ipa;
                tooltipPos.textContent = cached.pos;
                tooltipTrans.textContent = cached.trans;
                adjustTooltipPosition(target);
            } else {
                Promise.all([
                    fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=${encodeURIComponent(word)}`).then(res => res.json()),
                    fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`).then(res => res.json()).catch(() => null)
                ])
                .then(([transData, dictData]) => {
                    const trans = transData[0][0][0];
                    let ipa = "";
                    let pos = "";
                    
                    if (dictData && dictData[0]) {
                        ipa = dictData[0].phonetic || (dictData[0].phonetics && dictData[0].phonetics.find(p => p.text)?.text) || "";
                        if (dictData[0].meanings) {
                            const parts = dictData[0].meanings.map(m => m.partOfSpeech);
                            pos = [...new Set(parts)].join(', ');
                        }
                    }
                    
                    const result = { ipa, pos, trans };
                    dictCache[word] = result;
                    
                    if (tooltipWord.textContent === word) {
                        tooltipIpa.textContent = ipa;
                        tooltipPos.textContent = pos;
                        tooltipTrans.textContent = trans;
                        adjustTooltipPosition(target);
                    }
                })
                .catch(() => {
                    if (tooltipWord.textContent === word) {
                        tooltipTrans.textContent = "查询失败";
                    }
                });
            }
        }

        function adjustTooltipPosition(target) {
            const rect = target.getBoundingClientRect();
            const tooltipRect = tooltip.getBoundingClientRect();
            const left = rect.left + (rect.width - tooltipRect.width) / 2 + window.scrollX;
            const top = rect.top - tooltipRect.height - 8 + window.scrollY;
            tooltip.style.left = `${Math.max(10, left)}px`;
            tooltip.style.top = `${top}px`;
        }

        function hideTooltip() {
            tooltip.classList.remove('visible');
        }

        renderText();
        
        
    </script>
</body>
</html>
